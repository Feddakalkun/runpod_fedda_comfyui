name: Build And Publish GHCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: feddakalkun/runpod_fedda_comfyui

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cuda124
            cuda_image: nvidia/cuda:12.4.1-runtime-ubuntu22.04
            torch_index_url: https://download.pytorch.org/whl/cu124
            tags: |
              ghcr.io/feddakalkun/runpod_fedda_comfyui:latest
              ghcr.io/feddakalkun/runpod_fedda_comfyui:cu124
              ghcr.io/feddakalkun/runpod_fedda_comfyui:sha-${{ github.sha }}
          - name: cuda128-blackwell
            cuda_image: nvidia/cuda:12.8.1-runtime-ubuntu22.04
            torch_index_url: https://download.pytorch.org/whl/cu128
            tags: |
              ghcr.io/feddakalkun/runpod_fedda_comfyui:cu128
              ghcr.io/feddakalkun/runpod_fedda_comfyui:blackwell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            CUDA_IMAGE=${{ matrix.cuda_image }}
            TORCH_INDEX_URL=${{ matrix.torch_index_url }}
          push: true
          tags: ${{ matrix.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
